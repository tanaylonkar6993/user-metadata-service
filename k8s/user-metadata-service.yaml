---
# Static K8s manifest for user-metadata-service
# Dynamic version is generated by the deployment-portal at registration time.
apiVersion: v1
kind: Namespace
metadata:
  name: user-metadata-service
  labels:
    team: platform

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: user-metadata-service-config
  namespace: user-metadata-service
data:
  DB_URL: "jdbc:postgresql://postgres-svc:5432/userdb"
  DB_DRIVER: "org.postgresql.Driver"
  SPRING_PROFILES_ACTIVE: "prod"

---
apiVersion: v1
kind: Secret
metadata:
  name: user-metadata-service-secret
  namespace: user-metadata-service
type: Opaque
stringData:
  DB_USER: "REPLACE_ME"
  DB_PASS: "REPLACE_ME"

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: user-metadata-service
  namespace: user-metadata-service
  annotations:
    eks.amazonaws.com/role-arn: "REPLACE_WITH_IAM_ROLE_ARN"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-metadata-service
  namespace: user-metadata-service
  labels:
    app: user-metadata-service
    team: platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-metadata-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: user-metadata-service
        team: platform
    spec:
      serviceAccountName: user-metadata-service
      terminationGracePeriodSeconds: 30
      containers:
        - name: user-metadata-service
          image: "REPLACE_WITH_ECR_URI:latest"
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: user-metadata-service-config
            - secretRef:
                name: user-metadata-service-secret
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: user-metadata-service
                topologyKey: kubernetes.io/hostname
      

---
apiVersion: v1
kind: Service
metadata:
  name: user-metadata-service
  namespace: user-metadata-service
  labels:
    app: user-metadata-service
spec:
  type: ClusterIP
  selector:
    app: user-metadata-service
  ports:
    - name: http
      port: 80
      targetPort: 8080

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: user-metadata-service-hpa
  namespace: user-metadata-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: user-metadata-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
